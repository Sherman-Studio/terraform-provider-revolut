name: Tests

on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

jobs:
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      # Advisory only: terraform-plugin-framework v1.19 requires go >= 1.25,
      # and golangci-lint v1.x (EOL) has no go1.25-built release, so it can't
      # load a go1.25 module. gofmt + `go vet` + tests are the hard gates.
      # TODO: drop continue-on-error once a golangci-lint release built with
      # go1.25 is wired in (golangci-lint-action@v8 + a v2 config).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        continue-on-error: true
        with:
          version: latest
      - name: Unit tests
        run: go test -v -cover ./...

  goreleaser-check:
    name: GoReleaser Build (snapshot)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: build --snapshot --clean

  docs-check:
    name: Docs up to date
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go generate ./...
      - name: Verify docs/ has no diff
        run: |
          if [ -n "$(git status --porcelain docs/)" ]; then
            echo "docs/ is stale — run 'make docs' and commit the result."
            git diff docs/
            exit 1
          fi
